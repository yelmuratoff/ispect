name: Test & Analyze

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/**"
      - ".github/workflows/test.yml"

jobs:
  # Pure Dart packages (no Flutter dependency)
  test-dart:
    name: "Test Dart packages"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - ispectify
          - ispectify_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: |
          cd packages/${{ matrix.package }}
          dart pub get

      - name: Analyze
        run: |
          cd packages/${{ matrix.package }}
          dart analyze --fatal-infos

      - name: Run tests
        run: |
          cd packages/${{ matrix.package }}
          dart test --coverage=coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dart-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage/

  # Flutter packages
  test-flutter:
    name: "Test Flutter packages"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - ispect
          - ispectify_dio
          - ispectify_http
          - ispectify_ws
          - ispectify_bloc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.6"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: |
          cd packages/${{ matrix.package }}
          flutter pub get

      - name: Analyze
        run: |
          cd packages/${{ matrix.package }}
          flutter analyze --fatal-infos

      - name: Run tests
        run: |
          cd packages/${{ matrix.package }}
          flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-flutter-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage/
