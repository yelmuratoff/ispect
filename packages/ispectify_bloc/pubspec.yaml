name: ispectify_bloc
description: BLoC and Cubit observer for ISpect with event, transition, change, error, completion, and redacted metadata logging.
version: 6.0.4
homepage: https://github.com/yelmuratoff/ispect
repository: https://github.com/yelmuratoff/ispect
issue_tracker: https://github.com/yelmuratoff/ispect/issues

environment:
  sdk: ">=3.6.0 <4.0.0"

dependency_overrides:
  ispectify:
    path: ../ispectify

dependencies:
  ispectify: ^6.0.4
  bloc: ^9.1.0
  meta: ^1.16.0

dev_dependencies:
  lints: ">=5.1.1 <7.0.0"
  test: ^1.25.14
