name: ispectify_db
description: Passive database observability for ISpect with operation tracing, timings, slow-query logs, result projection, and redaction.
version: 6.1.2
homepage: https://github.com/yelmuratoff/ispect
repository: https://github.com/yelmuratoff/ispect
issue_tracker: https://github.com/yelmuratoff/ispect/issues

environment:
  sdk: ">=3.6.0 <4.0.0"

dependency_overrides:
  ispectify:
    path: ../ispectify

dependencies:
  ispectify: ^6.1.2

dev_dependencies:
  benchmark_harness: ^2.3.1
  lints: ">=5.1.1 <7.0.0"
  test: ^1.25.14
