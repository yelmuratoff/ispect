name: ispectify_db_example
publish_to: "none"
description: Example app demonstrating passive DB logging with ispectify_db
version: 0.1.0

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.22.0"

dependency_overrides:
  ispectify:
    path: ../../ispectify

dependencies:
  flutter:
    sdk: flutter
  ispectify: ^4.8.0-dev12
  ispectify_db:
    path: ..
  collection: ^1.18.0

  # Pure Dart DB packages
  hive_ce: ^2.19.0
  sembast: ^3.7.4
  drift: ^2.22.0
  sqlite3: ^2.7.0
  sqflite_common: ^2.5.4
  sqflite_common_ffi: ^2.3.4

  # Flutter DB packages
  shared_preferences: ^2.5.0
  flutter_secure_storage: ^10.0.0
  cloud_firestore: ^5.5.0
  fake_cloud_firestore: ^3.1.0
  isar_community: ^3.3.0
  isar_community_flutter_libs: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.1.1
  test: ^1.25.14
  build_runner: ^2.4.0
  isar_community_generator: ^3.3.0
  drift_dev: ^2.29.0
  flutter_lints: ^5.0.0
