name: ispectify_riverpod
description: Riverpod ProviderObserver for ISpect with add, update, dispose, fail, and redacted metadata logging.
version: 5.2.0-dev.23
homepage: https://github.com/yelmuratoff/ispect
repository: https://github.com/yelmuratoff/ispect
issue_tracker: https://github.com/yelmuratoff/ispect/issues

environment:
  sdk: ">=3.6.0 <4.0.0"

dependency_overrides:
  ispectify:
    path: ../ispectify

dependencies:
  ispectify: ^5.2.0-dev.23
  riverpod: ^2.5.0
  meta: ^1.16.0

dev_dependencies:
  lints: ">=5.1.1 <7.0.0"
  test: ^1.25.14
