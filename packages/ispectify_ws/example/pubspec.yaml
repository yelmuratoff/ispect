name: ispectify_ws_example
publish_to: "none"
description: Example app demonstrating provider-agnostic WebSocket logging with ispectify_ws
version: 0.1.0

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.22.0"

dependency_overrides:
  ispectify:
    path: ../../ispectify

dependencies:
  flutter:
    sdk: flutter
  ispectify: ^5.2.0-dev.15
  ispectify_ws:
    path: ..

  ws: ^1.0.0
  socket_io_client: ^3.0.0
  web_socket_channel: ^3.0.0
  stream_channel: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.25.14
