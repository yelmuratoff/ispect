name: ispectify_ws
description: Provider-agnostic WebSocket diagnostics for ISpect — connection lifecycle, sent and received frame logging, session grouping, and redaction for any WebSocket client.
version: 6.1.0
homepage: https://github.com/yelmuratoff/ispect
repository: https://github.com/yelmuratoff/ispect
issue_tracker: https://github.com/yelmuratoff/ispect/issues

environment:
  sdk: ">=3.6.0 <4.0.0"

dependency_overrides:
  ispectify:
    path: ../ispectify

dependencies:
  ispectify: ^6.1.0

dev_dependencies:
  lints: ">=5.1.1 <7.0.0"
  test: ^1.25.14
