name: ispectify_ws
description: WebSocket diagnostics for ISpect with connection lifecycle, sent and received frame logging, grouping, and redaction.
version: 5.2.0-dev.12
homepage: https://github.com/yelmuratoff/ispect
repository: https://github.com/yelmuratoff/ispect
issue_tracker: https://github.com/yelmuratoff/ispect/issues

environment:
  sdk: ">=3.6.0 <4.0.0"

dependency_overrides:
  ispectify:
    path: ../ispectify

dependencies:
  ws: ^1.0.0
  ispectify: ^5.2.0-dev.12

dev_dependencies:
  lints: ">=5.1.1 <7.0.0"
  test: ^1.25.14
