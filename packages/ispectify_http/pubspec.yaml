name: ispectify_http
description: http_interceptor integration for ISpect with correlated HTTP request, response, error, timing, and redacted payload logs.
version: 6.0.6
homepage: https://github.com/yelmuratoff/ispect
repository: https://github.com/yelmuratoff/ispect
issue_tracker: https://github.com/yelmuratoff/ispect/issues

environment:
  sdk: ">=3.6.0 <4.0.0"

dependency_overrides:
  ispectify:
    path: ../ispectify

dependencies:
  http: ^1.5.0
  http_interceptor: ^3.0.0
  http_parser: ^4.1.2
  ispectify: ^6.0.6

dev_dependencies:
  lints: ">=5.1.1 <7.0.0"
  test: ^1.25.14
