name: ispectify_dio
description: Dio interceptor for ISpect that captures correlated request, response, error, timing, and redacted payload diagnostics.
version: 5.0.0-dev54
homepage: https://github.com/yelmuratoff/ispect
repository: https://github.com/yelmuratoff/ispect
issue_tracker: https://github.com/yelmuratoff/ispect/issues

environment:
  sdk: ">=3.6.0 <4.0.0"

dependency_overrides:
  ispectify:
    path: ../ispectify

dependencies:
  ansicolor: ^2.0.3
  dio: ^5.8.0+1
  ispectify: ^5.0.0-dev54

dev_dependencies:
  lints: ^5.1.1
  test: ^1.25.14
